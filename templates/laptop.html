<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Predictor</title>
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #c084fc;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 400;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Customize select arrow */
        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 48px;
        }

        option {
            background-color: #1e1b4b;
            color: var(--text-main);
        }

        button {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
            margin-top: 28px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 32px;
            padding: 20px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-title {
            font-size: 0.9rem;
            color: #c084fc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #34d399;
            text-shadow: 0 0 10px rgba(52, 211, 153, 0.2);
        }

        .error-value {
            font-size: 1.1rem;
            font-weight: 500;
            color: #f87171;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Laptop Price Predictor</h1>
    <p class="subtitle">Enter device specifications to estimate the value</p>

    <form action="/predict" method="POST">
        <div class="form-group">
            <label for="company">Company / Brand</label>
            <select name="company" id="company" required>
                <option value="" disabled selected>Select Brand</option>
                <option>Acer</option>
                <option>Apple</option>
                <option>Asus</option>
                <option>Chuwi</option>
                <option>Dell</option>
                <option>Fujitsu</option>
                <option>Google</option>
                <option>HP</option>
                <option>Huawei</option>
                <option>Lenovo</option>
                <option>LG</option>
                <option>Mediacom</option>
                <option>Microsoft</option>
                <option>MSI</option>
                <option>Razer</option>
                <option>Samsung</option>
                <option>Toshiba</option>
                <option>Vero</option>
                <option>Xiaomi</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ram">RAM (GB)</label>
            <input type="number" name="ram" id="ram" placeholder="e.g. 8" min="2" max="64" required>
        </div>

        <div class="form-group">
            <label for="weight">Weight (Kg)</label>
            <input type="number" step="0.01" name="weight" id="weight" placeholder="e.g. 1.86" min="0.5" max="10" required>
        </div>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction_text %}
    <div class="result-container">
        {% if "Error" in prediction_text %}
            <p class="error-value">{{ prediction_text }}</p>
        {% else %}
            <p class="result-title">Estimated Value</p>
            <p class="result-value">{{ prediction_text.split(': ')[1] }}</p>
        {% endif %}
    </div>
    {% endif %}
</div>

</body>
</html>
